description: Return duration and reimbursement decision and return periods

mandatory_insurance:
  description: Return duration (Art. 9 SR 0.142.117.121)
  return_period:
    description: Minimum duration for all steps of the return process
    metadata:
      unit: days
      reference:
        - title: "Art. 9 SR 0.142.117.121"
          href: "https://www.admin.ch/opc/fr/classified-compilation/20211025/index.html#art_9"
    values:
      2024-01-01:
        value: 30
      2020-01-01:
        value: 30

optional_insurance:
  description: Maximum duration for reimbursement decision and return periods
  decision_extension_duration:
    description: Maximum time an extension can last (Art. 9 SR 0.142.117.121)
    metadata:
      unit: days
      reference:
        - title: "Art. 9 SR 0.142.117.121"
          href: "https://www.admin.ch/opc/fr/classified-compilation/20211025/index.html#art_9"
    values:
      2024-01-01:
        value: 30
      2020-01-01:
        value: 30
  return_extension_duration:
    description: Maximum time the return procedure can be delayed (Art. 9 SR 0.142.117.121)
    metadata:
      unit: days
      reference:
        - title: "Art. 9 SR 0.142.117.121"
          href: "https://www.admin.ch/opc/fr/classified-compilation/20211025/index.html#art_9"
    values:
      2024-01-01:
        value: 60
      2020-01-01:
        value: 60
