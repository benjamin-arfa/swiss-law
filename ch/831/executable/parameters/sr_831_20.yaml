description: "Parameters for SR 831.20 - IVG (Federal Disability Insurance Act)"
metadata:
  reference: "SR 831.20"

iv:
  beitragssatz_erwerbstaetige:
    description: "IV contribution rate on employment income"
    reference: "SR 831.20 Art. 3 Abs. 1"
    unit: rate
    values:
      2011-01-01:
        value: 0.014

  mindestbeitrag_nichterwerbstaetige_obligatorisch:
    description: "Minimum IV contribution for non-employed obligatorily insured (CHF/year)"
    reference: "SR 831.20 Art. 3 Abs. 1bis"
    unit: CHF
    values:
      2025-01-01:
        value: 70

  mindestbeitrag_nichterwerbstaetige_freiwillig:
    description: "Minimum IV contribution for non-employed voluntarily insured (CHF/year)"
    reference: "SR 831.20 Art. 3 Abs. 1bis"
    unit: CHF
    values:
      2025-01-01:
        value: 140

  mindest_invaliditaetsgrad_rente:
    description: "Minimum degree of disability for pension entitlement (%)"
    reference: "SR 831.20 Art. 28 Abs. 1 Bst. c"
    unit: percent
    values:
      2008-01-01:
        value: 40

  wartefrist_rente_monate:
    description: "Waiting period before pension entitlement arises (months)"
    reference: "SR 831.20 Art. 29 Abs. 1"
    unit: months
    values:
      2008-01-01:
        value: 6

  mindest_alter_rente:
    description: "Minimum age for pension entitlement (years)"
    reference: "SR 831.20 Art. 29 Abs. 1"
    unit: years
    values:
      2008-01-01:
        value: 18

  mindest_beitragsjahre_ordentliche_rente:
    description: "Minimum contribution years for ordinary pension"
    reference: "SR 831.20 Art. 36 Abs. 1"
    unit: years
    values:
      2008-01-01:
        value: 3

  hilflosenentschaedigung_schwer:
    description: "Helplessness allowance rate for severe helplessness (fraction of max AHV pension)"
    reference: "SR 831.20 Art. 42ter Abs. 1"
    unit: rate
    values:
      2004-01-01:
        value: 0.80

  hilflosenentschaedigung_mittel:
    description: "Helplessness allowance rate for moderate helplessness"
    reference: "SR 831.20 Art. 42ter Abs. 1"
    unit: rate
    values:
      2004-01-01:
        value: 0.50

  hilflosenentschaedigung_leicht:
    description: "Helplessness allowance rate for mild helplessness"
    reference: "SR 831.20 Art. 42ter Abs. 1"
    unit: rate
    values:
      2004-01-01:
        value: 0.20

  heim_reduktion_minderjaehrige:
    description: "Reduction factor for minors in care institutions"
    reference: "SR 831.20 Art. 42ter Abs. 2"
    unit: rate
    values:
      2004-01-01:
        value: 0.25

  grundentschaedigung_satz:
    description: "Basic compensation rate for daily allowance (fraction of last income)"
    reference: "SR 831.20 Art. 23 Abs. 1"
    unit: rate
    values:
      2004-01-01:
        value: 0.80

  kindergeld_taggeld_satz:
    description: "Child allowance rate per child as fraction of max daily allowance"
    reference: "SR 831.20 Art. 23bis"
    unit: rate
    values:
      2004-01-01:
        value: 0.02

  kinderrente_satz:
    description: "Child pension rate as fraction of disability pension"
    reference: "SR 831.20 Art. 38 Abs. 1"
    unit: rate
    values:
      1980-01-01:
        value: 0.40

  kinderrente_plafond_beide_eltern:
    description: "Cap on combined child pensions when both parents entitled (fraction of max IV pension)"
    reference: "SR 831.20 Art. 38 Abs. 1"
    unit: rate
    values:
      1997-01-01:
        value: 0.60

  ueberversicherung_schwelle:
    description: "Over-insurance threshold: child pensions + parent pension may not exceed this fraction of relevant income"
    reference: "SR 831.20 Art. 38bis Abs. 1"
    unit: rate
    values:
      2008-01-01:
        value: 0.90

  jung_invalide_minimum_satz:
    description: "Minimum pension rate for persons disabled before age 25 with full contribution record (fraction of minimum full pension)"
    reference: "SR 831.20 Art. 37 Abs. 2"
    unit: rate
    values:
      1980-01-01:
        value: 1.3333

  mindest_arbeitsunfaehigkeit_taggeld:
    description: "Minimum incapacity for work to qualify for daily allowance (%)"
    reference: "SR 831.20 Art. 22 Abs. 1 Bst. b"
    unit: percent
    values:
      2022-01-01:
        value: 50

  auslaender_mindest_beitragsjahre:
    description: "Minimum contribution years for foreign nationals at onset of disability"
    reference: "SR 831.20 Art. 6 Abs. 2"
    unit: years
    values:
      2003-01-01:
        value: 1

  auslaender_mindest_aufenthaltsjahre:
    description: "Minimum continuous residence years for foreign nationals"
    reference: "SR 831.20 Art. 6 Abs. 2"
    unit: years
    values:
      2003-01-01:
        value: 10
