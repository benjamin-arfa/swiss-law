    description: "Annual flat rate for ancillary costs for owner-occupied property (CHF)"
    reference: "SR 837.21 Art. 11 Abs. 3"
    unit: CHF
    values:
      2025-01-01:
        value: 3480
      2021-01-01:
        value: 3060

  heizkosten_faktor:
    description: "Heating costs as fraction of ancillary costs flat rate"
    reference: "SR 837.21 Art. 12"
    unit: rate
